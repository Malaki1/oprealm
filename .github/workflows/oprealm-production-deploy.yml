name: OPREALM Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oprealm-production-deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Guarded production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://oprealm.com
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPREALM_D1_DATABASE: oprealm-discord
      OPREALM_PAGES_PROJECT: oprealm

    steps:
      - name: Guard main branch only
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Production deploy is guarded and can only run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Require Cloudflare repository secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing required GitHub repository secret: ${secret_name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Check out guarded main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Regenerate source-of-truth docs
        run: node scripts/generate-content-machine-docs.mjs

      - name: Verify generated docs are committed
        run: git diff --exit-code -- AGENTS.md docs

      - name: Verify Cloudflare production targets
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler d1 info "${OPREALM_D1_DATABASE}"
          npx wrangler pages deployment list --project-name "${OPREALM_PAGES_PROJECT}"

      - name: Apply production D1 migrations
        run: npx wrangler d1 migrations apply "${OPREALM_D1_DATABASE}" --remote

      - name: Deploy production Cloudflare Pages
        run: >
          npx wrangler pages deploy public
          --project-name "${OPREALM_PAGES_PROJECT}"
          --branch main
          --commit-hash "${GITHUB_SHA}"
          --commit-message "GitHub Actions production deploy ${GITHUB_SHA}"
