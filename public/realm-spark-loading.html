<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening World Creator | OPREALM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --cyan: #22d3ee;
        --blue: #4f7cff;
        --purple: #7c3aed;
        --pink: #ec4899;
        --navy: #030818;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: white;
        background:
          radial-gradient(circle at 50% 30%, rgba(124, 58, 237, 0.38), transparent 34rem),
          radial-gradient(circle at 20% 80%, rgba(34, 211, 238, 0.2), transparent 28rem),
          var(--navy);
      }

      .spark-video,
      .spark-fallback,
      .spark-overlay {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .spark-video {
        object-fit: cover;
        opacity: 0.55;
      }

      .spark-fallback {
        background:
          radial-gradient(circle at 50% 45%, rgba(236, 72, 153, 0.34), transparent 12rem),
          radial-gradient(circle at 50% 45%, rgba(34, 211, 238, 0.25), transparent 18rem),
          repeating-radial-gradient(circle at 50% 45%, transparent 0 2.4rem, rgba(255, 255, 255, 0.055) 2.5rem 2.57rem);
        animation: pulseRealm 3.5s ease-in-out infinite alternate;
      }

      .spark-overlay {
        background:
          linear-gradient(180deg, rgba(3, 8, 24, 0.58), rgba(3, 8, 24, 0.8)),
          radial-gradient(circle at 50% 48%, transparent, rgba(3, 8, 24, 0.52) 40%, rgba(3, 8, 24, 0.94));
      }

      .spark-shell {
        position: relative;
        z-index: 2;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 28px;
      }

      .spark-card {
        width: min(760px, 100%);
        padding: clamp(28px, 5vw, 56px);
        border: 1px solid rgba(110, 231, 255, 0.32);
        border-radius: 32px;
        text-align: center;
        background: rgba(6, 14, 38, 0.68);
        box-shadow: 0 32px 90px rgba(0, 0, 0, 0.52), 0 0 64px rgba(124, 58, 237, 0.28);
        backdrop-filter: blur(20px);
      }

      .spark-mark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
        color: #8df6ff;
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .spark-mark::before {
        content: "";
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
        box-shadow: 0 0 28px rgba(34, 211, 238, 0.45);
        transform: rotate(45deg);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.3rem, 7vw, 5.4rem);
        line-height: 0.94;
        letter-spacing: -0.04em;
      }

      h1 span {
        display: block;
        background: linear-gradient(90deg, var(--cyan), var(--blue), var(--pink));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .idea {
        margin: 20px auto 0;
        max-width: 580px;
        color: #c7d7ff;
        font-size: clamp(1rem, 2vw, 1.15rem);
        line-height: 1.6;
      }

      .phase {
        min-height: 28px;
        margin: 34px 0 14px;
        color: #a6f7ff;
        font-weight: 900;
      }

      .progress {
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.09);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 0 24px rgba(124, 58, 237, 0.35);
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
        box-shadow: 0 0 22px rgba(236, 72, 153, 0.72);
        transition: width 350ms ease;
      }

      .progress-row {
        display: flex;
        justify-content: space-between;
        margin-top: 12px;
        color: #98a9d7;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .spark-actions {
        display: none;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      .spark-actions.is-visible {
        display: flex;
      }

      .spark-actions a,
      .spark-actions button {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 13px 18px;
        color: white;
        background: rgba(255, 255, 255, 0.08);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }

      @keyframes pulseRealm {
        from { transform: scale(1); filter: hue-rotate(0deg); }
        to { transform: scale(1.05); filter: hue-rotate(22deg); }
      }
    </style>
    <script src="/realm-spark-core.js?v=1" defer></script>
  </head>
  <body>
    <div class="spark-fallback" aria-hidden="true"></div>
    <video class="spark-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
      <source src="/assets/realm-spark/realm-spark-loading.mp4" type="video/mp4" />
    </video>
    <div class="spark-overlay" aria-hidden="true"></div>

    <main class="spark-shell">
      <section class="spark-card" aria-live="polite">
        <div class="spark-mark">OPREALM Creator Engine</div>
        <h1>Opening Your <span>World</span></h1>
        <p class="idea" id="sparkIdea">Reading your idea...</p>
        <div class="phase" id="sparkPhase">Reading your idea...</div>
        <div class="progress" aria-label="Generation progress">
          <div class="progress-fill" id="sparkProgress"></div>
        </div>
        <div class="progress-row">
          <span id="sparkPercent">0%</span>
          <span id="sparkStep">Preparing</span>
        </div>
        <div class="spark-actions" id="sparkActions">
          <a href="/#creation-tools">Edit Idea</a>
          <button type="button" id="sparkRetry">Try Again</button>
        </div>
      </section>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const phases = [
          "Reading your idea...",
          "Expanding your world concept...",
          "Choosing the perfect setting...",
          "Creating landmarks and mood...",
          "Preparing creator details...",
          "Saving your world starter...",
          "Opening the World Creator...",
        ];

        const params = new URLSearchParams(window.location.search);
        const engine = window.OPREALMRealmSpark;
        const rawIdea = params.get("idea")
          || localStorage.getItem(engine?.STORAGE?.input || "oprealm_realm_spark_original_idea_v1")
          || localStorage.getItem(engine?.STORAGE?.legacyHomePrompt || "oprealm_home_prompt")
          || "";
        const idea = engine?.cleanIdea(rawIdea) || "";
        const ideaNode = document.querySelector("#sparkIdea");
        const phaseNode = document.querySelector("#sparkPhase");
        const progressNode = document.querySelector("#sparkProgress");
        const percentNode = document.querySelector("#sparkPercent");
        const stepNode = document.querySelector("#sparkStep");
        const actions = document.querySelector("#sparkActions");
        const retry = document.querySelector("#sparkRetry");

        function setProgress(value, phaseIndex) {
          const clamped = Math.max(0, Math.min(100, Math.round(value)));
          progressNode.style.width = `${clamped}%`;
          percentNode.textContent = `${clamped}%`;
          const phase = phases[Math.min(phases.length - 1, Math.max(0, phaseIndex))];
          phaseNode.textContent = phase;
          stepNode.textContent = `Step ${Math.min(phases.length, phaseIndex + 1)} of ${phases.length}`;
        }

        function fail(message) {
          phaseNode.textContent = message;
          actions.classList.add("is-visible");
        }

        function run() {
          if (!idea || idea.length < 4) {
            fail("Add one quick idea first, then OPREALM can open your World Creator.");
            return;
          }

          engine.saveSparkInput(idea);
          ideaNode.textContent = `"${idea}"`;
          actions.classList.remove("is-visible");

          let progress = 0;
          let phaseIndex = 0;
          setProgress(0, 0);

          const timer = window.setInterval(() => {
            progress += 7 + Math.random() * 8;
            if (progress > 88) progress = 88;
            phaseIndex = Math.min(phases.length - 2, Math.floor((progress / 90) * (phases.length - 1)));
            setProgress(progress, phaseIndex);
          }, 360);

          window.setTimeout(() => {
            try {
              const output = engine.makeOutput(idea);
              engine.saveSparkOutput(output);
              window.clearInterval(timer);
              setProgress(100, phases.length - 1);
              window.setTimeout(() => {
                window.location.href = "/storyboard-world.html?from=home";
              }, 650);
            } catch (error) {
              window.clearInterval(timer);
              fail("The World Creator hit a wobble. Try again or edit your idea.");
            }
          }, 2600);
        }

        retry?.addEventListener("click", run);
        run();
      });
    </script>
  </body>
</html>
