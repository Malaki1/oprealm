<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Choose a new OPREALM password from a secure reset link." />
    <title>Choose New OPREALM Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/studio.css?v=3" />
    <script src="/account-nav.js?v=1" defer></script>
    <script src="/reset-password.js?v=1" defer></script>
  </head>
  <body>
    <header class="studio-header">
      <a class="studio-brand" href="/">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span>OPREALM Password Reset</span>
      </a>
      <nav aria-label="Reset navigation">
        <a href="/login" data-account-link>Log In</a>
        <a href="/forgot-password">Request New Link</a>
      </nav>
    </header>

    <main class="studio-shell auth-shell">
      <section class="studio-hero auth-hero auth-hero-single">
        <div>
          <p class="eyebrow">Secure reset</p>
          <h1>Choose a new password.</h1>
          <p>This page only works from the time-limited link sent to your email.</p>
        </div>
      </section>

      <section class="auth-grid auth-grid-single">
        <form class="publish-form account-card" id="resetPasswordForm">
          <div>
            <p class="eyebrow">Step 2</p>
            <h2>Update Password</h2>
          </div>
          <label>
            New password
            <input name="password" type="password" autocomplete="new-password" minlength="10" required />
          </label>
          <button class="button button-primary" type="submit">Update Password</button>
          <p class="form-note" id="resetPasswordStatus"></p>
        </form>
      </section>
    </main>
  </body>
</html>
