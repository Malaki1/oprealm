<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Request an OPREALM password reset email." />
    <title>Reset OPREALM Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/studio.css?v=2" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
    <script src="/forgot-password.js?v=1" defer></script>
  </head>
  <body>
    <header class="studio-header">
      <a class="studio-brand" href="/">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span>OPREALM Password Reset</span>
      </a>
      <nav aria-label="Password reset navigation">
        <a href="/login">Log In</a>
        <a href="/studio">Creator Studio</a>
      </nav>
    </header>

    <main class="studio-shell auth-shell">
      <section class="studio-hero auth-hero auth-hero-single">
        <div>
          <p class="eyebrow">Account recovery</p>
          <h1>Send a secure reset link.</h1>
          <p>Enter the account email and we will send a time-limited link to choose a new password.</p>
        </div>
      </section>

      <section class="auth-grid auth-grid-single">
        <form class="publish-form account-card" id="resetRequestForm">
          <div>
            <p class="eyebrow">Step 1</p>
            <h2>Request Reset Email</h2>
          </div>
          <label>
            Account email
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <div class="turnstile-slot" data-turnstile="reset"></div>
          <button class="button button-primary" type="submit">Send Reset Link</button>
          <p class="form-note" id="resetRequestStatus"></p>
        </form>
      </section>
    </main>
  </body>
</html>
