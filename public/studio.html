<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="OPREALM Studio is a safe creator launcher where kids can make games, stories, music and movies with guided AI-powered tools."
    />
    <title>OPREALM Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/studio.css?v=47" />
    <script src="/realm-spark-core.js?v=1" defer></script>
    <script src="/studio.js?v=11" defer></script>
  </head>
  <body class="studio-launcher-body">
    <header class="studio-header launcher-header">
      <a class="studio-brand" href="/">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span>OPREALM Studio</span>
      </a>
      <nav aria-label="Studio navigation">
        <a href="/library">Library</a>
        <a href="/account">My Creations</a>
        <a href="/safety">Parent</a>
        <a href="/account">Profile</a>
        <a class="button button-primary" href="#studioDescribe">Create</a>
      </nav>
    </header>

    <main class="studio-launcher studio-describe-main">
      <section class="launcher-hero studio-describe-hero" aria-labelledby="studioDescribeTitle">
        <img class="launcher-bg" src="/assets/studio/backgrounds/bg-oprealm-main-world.png" alt="" />
        <div class="launcher-hero-glow" aria-hidden="true"></div>

        <div class="studio-describe-card" id="studioDescribe">
          <div class="describe-particles" aria-hidden="true"></div>
          <div class="describe-mascot-wrap" aria-hidden="true">
            <span class="describe-mascot-glow"></span>
            <span class="describe-orbit describe-orbit-one"></span>
            <span class="describe-orbit describe-orbit-two"></span>
            <span class="describe-orbit describe-orbit-three"></span>
            <img class="describe-mascot" src="/assets/homepage/mascot/orbit.png" alt="" />
          </div>

          <div class="describe-copy">
            <p class="launcher-pill">Safe AI creator world for kids 6+</p>
            <h1 id="studioDescribeTitle">Describe <span>Anything</span></h1>
            <p>Games, stories, worlds, characters, music and more.</p>
          </div>

          <form class="describe-prompt" data-studio-prompt-form action="/realm-spark-loading.html">
            <label class="sr-only" for="studioIdeaPrompt">Describe your idea</label>
            <button class="describe-prompt-button describe-voice-button" type="button" data-studio-voice aria-label="Start voice prompt">
              <span class="op-icon op-icon-mic" aria-hidden="true"></span>
            </button>
            <input id="studioIdeaPrompt" name="idea" type="text" autocomplete="off" placeholder="Describe your idea..." aria-label="Describe your idea" />
            <input id="studioIdeaUpload" type="file" accept="image/*" hidden data-studio-upload-input />
            <button class="describe-prompt-button describe-upload-button" type="button" data-studio-upload aria-label="Upload an image or drawing">
              <span class="op-icon op-icon-upload" aria-hidden="true"></span>
            </button>
            <button class="describe-prompt-button describe-generate-button" type="submit" aria-label="Generate from idea">
              <span class="op-icon op-icon-favorite" aria-hidden="true"></span>
            </button>
          </form>

          <p class="describe-tip"><span class="op-icon op-icon-favorite" aria-hidden="true"></span> Tip: Try <span>"a futuristic racing game in space"</span></p>

          <div class="describe-chips" aria-label="AI creation shortcuts">
            <button type="button" data-studio-chip="voice"><span class="op-icon op-icon-mic" aria-hidden="true"></span> Voice</button>
            <button type="button" data-studio-chip="draw"><span class="op-icon op-icon-image" aria-hidden="true"></span> Draw</button>
            <button type="button" data-studio-random><span class="op-icon op-icon-options" aria-hidden="true"></span> Random Idea</button>
            <button type="button" data-studio-chip="inspire"><span class="op-icon op-icon-favorite" aria-hidden="true"></span> Inspire Me</button>
            <button type="button" data-studio-chip="trending"><span class="op-icon op-icon-time" aria-hidden="true"></span> Trending</button>
            <button type="button" data-studio-chip="remix"><span class="op-icon op-icon-refresh" aria-hidden="true"></span> Remix</button>
            <button type="button" data-studio-chip="build-game"><span class="op-icon op-icon-dashboard" aria-hidden="true"></span> Build Game</button>
            <button type="button" data-studio-chip="make-story"><span class="op-icon op-icon-document" aria-hidden="true"></span> Make Story</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
