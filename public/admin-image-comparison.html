<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Model Comparison Lab | OPRealm</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050a1b;
        --panel: rgba(12, 24, 54, 0.88);
        --line: rgba(123, 190, 255, 0.2);
        --text: #f7fbff;
        --muted: #a8bad7;
        --cyan: #27dcff;
        --purple: #925cff;
        --green: #62efad;
        --danger: #ff7896;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 15% 0%, rgba(39, 220, 255, 0.18), transparent 34rem),
          radial-gradient(circle at 90% 5%, rgba(146, 92, 255, 0.2), transparent 32rem),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      button, input, textarea { font: inherit; }
      .shell { width: min(1440px, calc(100% - 32px)); margin: auto; padding: 34px 0 70px; }
      .hero { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 24px; }
      .eyebrow { margin: 0 0 8px; color: var(--cyan); font-size: .78rem; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(2.3rem, 6vw, 5.4rem); line-height: .96; }
      h1 span { color: transparent; background: linear-gradient(90deg, var(--cyan), var(--purple)); background-clip: text; }
      .hero-copy { max-width: 760px; margin: 14px 0 0; color: var(--muted); line-height: 1.6; }
      .admin-link { color: #d9e8ff; text-decoration: none; border: 1px solid var(--line); border-radius: 12px; padding: 11px 14px; }

      .control-panel, .model-card, .result-card, .notice {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 24px 70px rgba(0,0,0,.24);
      }
      .control-panel { display: grid; gap: 18px; padding: 20px; border-radius: 22px; }
      .field-grid { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; }
      label > span { display: block; margin-bottom: 7px; color: #d9e7fb; font-size: .82rem; font-weight: 850; }
      textarea, input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(3, 9, 25, .78);
        color: #fff;
        padding: 14px;
        outline: none;
      }
      textarea { min-height: 124px; resize: vertical; line-height: 1.5; }
      textarea:focus, input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(39,220,255,.12); }

      .model-head { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
      .model-head h2 { margin: 0; font-size: 1.15rem; }
      .small-actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .small-actions button, .run-button {
        border: 0;
        border-radius: 12px;
        color: #fff;
        cursor: pointer;
        font-weight: 850;
      }
      .small-actions button { padding: 8px 11px; background: rgba(255,255,255,.08); border: 1px solid var(--line); }
      .model-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
      .model-card { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; padding: 14px; border-radius: 16px; }
      .model-card strong, .model-card small { display: block; }
      .model-card small { margin-top: 4px; color: var(--muted); }
      .provider { color: var(--cyan); font-size: .7rem; font-weight: 900; text-transform: uppercase; }

      .switch { position: relative; width: 48px; height: 28px; }
      .switch input { position: absolute; opacity: 0; pointer-events: none; }
      .switch span { position: absolute; inset: 0; border-radius: 99px; background: #263451; cursor: pointer; transition: .18s; }
      .switch span::after { content: ""; position: absolute; width: 20px; height: 20px; left: 4px; top: 4px; border-radius: 50%; background: #fff; transition: .18s; }
      .switch input:checked + span { background: linear-gradient(90deg, var(--cyan), var(--purple)); }
      .switch input:checked + span::after { transform: translateX(20px); }

      .run-row { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
      .estimate { color: var(--muted); }
      .estimate strong { color: var(--green); font-size: 1.2rem; }
      .run-button { min-height: 50px; padding: 0 24px; background: linear-gradient(135deg, var(--cyan), var(--purple)); box-shadow: 0 16px 36px rgba(39,220,255,.16); }
      .run-button:disabled { opacity: .55; cursor: wait; }
      .notice { margin: 16px 0; padding: 14px 16px; border-radius: 15px; color: #dcf9ea; border-color: rgba(98,239,173,.25); }
      .notice.error { color: #ffe0e7; border-color: rgba(255,120,150,.3); }
      .notice[hidden] { display: none; }

      .results { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 20px; }
      .result-card { overflow: hidden; border-radius: 19px; }
      .result-media { aspect-ratio: 3 / 2; display: grid; place-items: center; background: rgba(2,7,20,.86); color: var(--muted); }
      .result-media img { width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; }
      .result-media.is-error { padding: 24px; color: #ffd7e0; text-align: center; }
      .result-copy { padding: 14px; }
      .result-copy h3 { margin: 2px 0 7px; font-size: 1rem; }
      .result-meta { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: .78rem; }
      .spinner { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.14); border-top-color: var(--cyan); border-radius: 50%; animation: spin .8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      dialog { width: min(94vw, 1500px); border: 1px solid var(--line); border-radius: 18px; padding: 0; background: #030816; color: #fff; }
      dialog::backdrop { background: rgba(0,0,0,.86); }
      dialog img { display: block; width: 100%; max-height: 86vh; object-fit: contain; }
      dialog button { position: absolute; right: 12px; top: 12px; width: 42px; height: 42px; border: 0; border-radius: 50%; background: rgba(0,0,0,.7); color: #fff; cursor: pointer; }

      @media (max-width: 1000px) {
        .model-grid, .results { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .field-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 650px) {
        .hero, .run-row, .model-head { align-items: stretch; flex-direction: column; }
        .model-grid, .results { grid-template-columns: 1fr; }
        .run-button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Private admin tool</p>
          <h1>Image Model <span>Comparison Lab</span></h1>
          <p class="hero-copy">Send one identical prompt to every enabled model at the same time. Compare composition, prompt following, quality, speed and estimated cost side by side.</p>
        </div>
        <a class="admin-link" href="/admin-ai-dashboard.html">AI Cost Dashboard</a>
      </header>

      <form class="control-panel" id="comparisonForm">
        <div class="field-grid">
          <label>
            <span>Shared image prompt</span>
            <textarea id="prompt" maxlength="1800" required placeholder="Example: A cinematic wide shot of a young space explorer discovering a glowing crystal forest, polished 3D storybook style, dramatic moonlight, no text"></textarea>
          </label>
          <label>
            <span>Admin secret</span>
            <input id="secret" type="password" autocomplete="off" required placeholder="OPRealm admin secret" />
          </label>
        </div>

        <div class="model-head">
          <div>
            <p class="eyebrow">Models</p>
            <h2>Choose what runs</h2>
          </div>
          <div class="small-actions">
            <button type="button" id="enableAll">Enable all</button>
            <button type="button" id="disableAll">Disable all</button>
            <button type="button" id="cheapOnly">Cheap models only</button>
          </div>
        </div>
        <div class="model-grid" id="modelGrid"></div>

        <div class="run-row">
          <div class="estimate"><span id="selectedCount">0</span> models enabled. Estimated maximum: <strong id="estimatedCost">$0.00</strong></div>
          <button class="run-button" id="runButton" type="submit">Generate Comparison</button>
        </div>
      </form>

      <div class="notice" id="notice" hidden></div>
      <section class="results" id="results" aria-live="polite"></section>
    </main>

    <dialog id="imageDialog">
      <button type="button" id="closeDialog" aria-label="Close">&times;</button>
      <img id="dialogImage" alt="Enlarged generated result" />
    </dialog>

    <script>
      const models = [
        { id: "openai-gpt-image-2-low", provider: "OpenAI", name: "GPT Image 2", quality: "Low, landscape", cost: .005 },
        { id: "openai-gpt-image-mini-low", provider: "OpenAI", name: "GPT Image 1 Mini", quality: "Low, landscape", cost: .006 },
        { id: "openai-gpt-image-15-medium", provider: "OpenAI", name: "GPT Image 1.5", quality: "Medium, landscape", cost: .05 },
        { id: "openai-gpt-image-15-high", provider: "OpenAI", name: "GPT Image 1.5", quality: "High, landscape", cost: .2 },
        { id: "google-gemini-25-flash-image", provider: "Google", name: "Gemini 2.5 Flash Image", quality: "1K, 16:9", cost: .039 },
        { id: "google-gemini-31-flash-image", provider: "Google", name: "Gemini 3.1 Flash Image", quality: "1K, 16:9", cost: .067 },
        { id: "google-gemini-3-pro-image", provider: "Google", name: "Gemini 3 Pro Image", quality: "1K, 16:9", cost: .134 },
        { id: "bfl-flux-2-klein-4b", provider: "Black Forest Labs", name: "FLUX.2 Klein 4B", quality: "About 1.2MP", cost: .014 },
        { id: "bfl-flux-2-pro", provider: "Black Forest Labs", name: "FLUX.2 Pro Preview", quality: "About 1.2MP", cost: .03 },
      ];

      const form = document.querySelector("#comparisonForm");
      const grid = document.querySelector("#modelGrid");
      const results = document.querySelector("#results");
      const notice = document.querySelector("#notice");
      const runButton = document.querySelector("#runButton");
      const secret = document.querySelector("#secret");
      const dialog = document.querySelector("#imageDialog");
      const dialogImage = document.querySelector("#dialogImage");

      grid.innerHTML = models.map((item) => `
        <article class="model-card">
          <div>
            <span class="provider">${escapeHtml(item.provider)}</span>
            <strong>${escapeHtml(item.name)}</strong>
            <small>${escapeHtml(item.quality)} - ${money(item.cost)} listed output cost</small>
          </div>
          <label class="switch" title="Enable ${escapeHtml(item.name)}">
            <input type="checkbox" data-model-id="${escapeHtml(item.id)}" checked />
            <span></span>
          </label>
        </article>
      `).join("");

      secret.value = sessionStorage.getItem("oprealm_admin_secret") || "";
      grid.addEventListener("change", updateEstimate);
      document.querySelector("#enableAll").addEventListener("click", () => setAll(true));
      document.querySelector("#disableAll").addEventListener("click", () => setAll(false));
      document.querySelector("#cheapOnly").addEventListener("click", () => {
        modelInputs().forEach((input) => {
          const model = models.find((item) => item.id === input.dataset.modelId);
          input.checked = model.cost <= .015;
        });
        updateEstimate();
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const prompt = document.querySelector("#prompt").value.trim();
        const adminSecret = secret.value.trim();
        const modelIds = enabledModels().map((item) => item.id);
        if (!prompt || !adminSecret || !modelIds.length) {
          showNotice("Add a prompt, admin secret and at least one enabled model.", true);
          return;
        }
        sessionStorage.setItem("oprealm_admin_secret", adminSecret);
        setRunning(true);
        showLoadingCards(modelIds);
        showNotice(`Generating ${modelIds.length} images concurrently. Individual models may finish at different times.`);

        try {
          const response = await fetch("/api/admin-image-comparison", {
            method: "POST",
            headers: { "content-type": "application/json", Authorization: `Bearer ${adminSecret}` },
            body: JSON.stringify({ prompt, modelIds }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.ok) throw new Error(data.error || "Comparison failed.");
          renderResults(data.results || []);
          const completed = data.results.filter((item) => item.ok).length;
          showNotice(`${completed} of ${data.results.length} models completed in ${seconds(data.durationMs)}. Estimated successful output cost: ${money(data.estimatedCostUsd)}.`);
        } catch (error) {
          results.innerHTML = "";
          showNotice(error.message || "Comparison failed.", true);
        } finally {
          setRunning(false);
        }
      });

      results.addEventListener("click", (event) => {
        const image = event.target.closest("img[data-full-image]");
        if (!image) return;
        dialogImage.src = image.src;
        dialogImage.alt = image.alt;
        dialog.showModal();
      });
      document.querySelector("#closeDialog").addEventListener("click", () => dialog.close());
      dialog.addEventListener("click", (event) => {
        if (event.target === dialog) dialog.close();
      });

      function showLoadingCards(ids) {
        results.innerHTML = ids.map((id) => {
          const item = models.find((model) => model.id === id);
          return `<article class="result-card"><div class="result-media"><span class="spinner"></span></div><div class="result-copy"><span class="provider">${escapeHtml(item.provider)}</span><h3>${escapeHtml(item.name)}</h3><div class="result-meta"><span>Generating...</span><span>${money(item.cost)}</span></div></div></article>`;
        }).join("");
      }

      function renderResults(items) {
        results.innerHTML = items.map((item) => {
          const configured = models.find((model) => model.id === item.id);
          return `<article class="result-card">
            <div class="result-media ${item.ok ? "" : "is-error"}">
              ${item.ok ? `<img data-full-image src="${item.imageDataUrl}" alt="${escapeHtml(configured?.name || item.model)} generated comparison" />` : `<p>${escapeHtml(item.error || "Generation failed.")}</p>`}
            </div>
            <div class="result-copy">
              <span class="provider">${escapeHtml(item.provider)}</span>
              <h3>${escapeHtml(configured?.name || item.model)}</h3>
              <div class="result-meta"><span>${seconds(item.durationMs)}</span><span>${item.ok ? money(item.estimatedCostUsd) : "No successful output"}</span></div>
            </div>
          </article>`;
        }).join("");
      }

      function modelInputs() { return [...grid.querySelectorAll("[data-model-id]")]; }
      function enabledModels() {
        const ids = new Set(modelInputs().filter((input) => input.checked).map((input) => input.dataset.modelId));
        return models.filter((item) => ids.has(item.id));
      }
      function setAll(checked) { modelInputs().forEach((input) => { input.checked = checked; }); updateEstimate(); }
      function updateEstimate() {
        const enabled = enabledModels();
        document.querySelector("#selectedCount").textContent = enabled.length;
        document.querySelector("#estimatedCost").textContent = money(enabled.reduce((sum, item) => sum + item.cost, 0));
        runButton.disabled = !enabled.length;
      }
      function setRunning(running) {
        runButton.disabled = running || !enabledModels().length;
        runButton.textContent = running ? "Generating All Models..." : "Generate Comparison";
        modelInputs().forEach((input) => { input.disabled = running; });
      }
      function showNotice(message, error = false) {
        notice.hidden = false;
        notice.textContent = message;
        notice.className = `notice${error ? " error" : ""}`;
      }
      function money(value) { return Number(value || 0).toLocaleString(undefined, { style: "currency", currency: "USD", minimumFractionDigits: 3 }); }
      function seconds(ms) { return `${(Number(ms || 0) / 1000).toFixed(1)}s`; }
      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
      }
      updateEstimate();
    </script>
  </body>
</html>
